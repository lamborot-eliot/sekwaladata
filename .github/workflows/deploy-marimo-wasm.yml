name: Deploy Marimo WASM to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: poc_marimo
        run: uv sync

      - name: Export notebook to WASM
        working-directory: poc_marimo
        run: |
          uv run marimo export html-wasm materaliazed_view.py -o wasm_export/index.html --mode run

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: poc_marimo/wasm_export

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
